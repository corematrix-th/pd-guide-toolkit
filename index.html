<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PD Guide Toolkit</title>
  <link rel="stylesheet" href="style.css?v=4_8_6">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-GBWX6GCY18"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-GBWX6GCY18');
  </script>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div>
      <div class="title">PD Guide Toolkit</div>
      <div class="byline">by Nasree Jehteh</div>
    </div>
    <div class="site-stats topbar-stats" aria-label="Website statistics">
      Visitors : <span id="visitorCount">-</span> | Views : <span id="viewCount">-</span> | Online : <span id="onlineCount">-</span>
    </div>
  </div>

  <div class="controlbar">
    <div class="field small">
      <label>Product</label>
      <select id="product">
        <option value="thinkpad">ThinkPad</option>
        <option value="ideapad">IdeaPad</option>
        <option value="desktop">Desktop</option>
        <option value="aio">AIO</option>
      </select>
    </div>
    <div class="field">
      <label>Search</label>
      <input id="search" placeholder="no power, bsod, battery report, 2100">
    </div>
    <button class="clear" id="topClearBtn">Clear</button>
  </div>

  <div class="tree">
    <div class="col">
      <div class="col-title">LEVEL 1</div>
      <div id="level1"></div>
    </div>
    <div class="col wide">
      <div class="col-title">SYMPTOM / GUIDE</div>
      <div id="symptom"></div>
    </div>
  </div>

  <div class="main">
    <div class="left">
      <div id="currentSelection" class="current-selection"></div>
      <div id="mainTitle" class="section-title">TROUBLESHOOTING CHECKLIST</div>
      <div id="checklist"></div>
      <div id="manualBox" class="manual hidden"></div>
    </div>

    <div class="right">
      <div id="recTitle" class="section-title">CONCLUSION</div>
      <div id="recommendation" class="recommendation">-</div>
      <div id="suggestion" class="suggestion hidden"></div>
<div class="section-title">RESULT / EMAIL</div>
      <textarea id="note" placeholder="Result note, guide, or email will show here..."></textarea>

      <div class="buttons">
        <button id="generateBtn">Generate Note</button>
        <button class="green" id="emailThBtn">Email TH</button>
        <button class="green" id="emailEnBtn">Email EN</button>
        <button class="gray" id="clearBtn">Clear</button>
      </div>

      <div class="version">Version 4.8.6</div>
    </div>
  </div>
</div>


<div id="guideModal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <div id="modalTitle" class="modal-title">Guide</div>
      <button class="modal-close" id="modalCloseBtn">Close</button>
    </div>
    <pre id="modalBody" class="modal-body"></pre>
  </div>
</div>

<script src="data.js?v=4_8_6"></script>
<script src="app.js?v=4_8_6"></script>
<script>
  // Firebase Realtime Database counter for PD Guide Toolkit.
  // Global path: siteStats/global (does not reset when toolkit version changes).
  window.PD_FIREBASE_CONFIG = {
    apiKey: "AIzaSyCEbXMckd0TA5p2r88sLgxH9hTpGUaGNpI",
    authDomain: "pd-guide-toolkit.firebaseapp.com",
    databaseURL: "https://pd-guide-toolkit-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "pd-guide-toolkit",
    storageBucket: "pd-guide-toolkit.firebasestorage.app",
    messagingSenderId: "348983029780",
    appId: "1:348983029780:web:a1f53a65c8268663323701"
  };
</script>
<script type="module">
  const visitorEl = document.getElementById("visitorCount");
  const onlineEl = document.getElementById("onlineCount");
  const viewEl = document.getElementById("viewCount");

  function formatCount(value){
    const number = Number(value || 0);
    return Number.isFinite(number) ? number.toLocaleString() : "0";
  }

  async function initSiteStats(){
    if(!window.PD_FIREBASE_CONFIG){
      if(visitorEl) visitorEl.textContent = "-";
      if(onlineEl) onlineEl.textContent = "-";
      if(viewEl) viewEl.textContent = "-";
      return;
    }

    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js");
    const {
      getDatabase,
      ref,
      onValue,
      set,
      push,
      remove,
      onDisconnect,
      runTransaction,
      serverTimestamp
    } = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js");

    const app = initializeApp(window.PD_FIREBASE_CONFIG);
    const db = getDatabase(app);
    const basePath = "siteStats/global";

    const visitorsRef = ref(db, `${basePath}/visitors`);
    const viewsRef = ref(db, `${basePath}/views`);
    const onlineValueRef = ref(db, `${basePath}/online`);
    const onlineUsersRef = ref(db, `${basePath}/onlineUsers`);

    // Views increase every page load.
    runTransaction(viewsRef, current => (current || 0) + 1).catch(() => {});

    // Visitors increase only when this browser/profile has no stored UUID.
    // Refreshing the page keeps the same UUID and does not increase Visitors.
    const visitorUuidKey = "pdGuideToolkitVisitorUUID";
    const legacyVisitorKey = "pdGuideToolkitVisitorCounted";
    let visitorUuid = localStorage.getItem(visitorUuidKey);

    function createVisitorUuid(){
      if(window.crypto && typeof window.crypto.randomUUID === "function"){
        return window.crypto.randomUUID();
      }
      return `visitor-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
    }

    if(!visitorUuid){
      visitorUuid = createVisitorUuid();
      localStorage.setItem(visitorUuidKey, visitorUuid);

      // Migration note: users already counted by v4.7.x should not be counted again.
      if(!localStorage.getItem(legacyVisitorKey)){
        await runTransaction(visitorsRef, current => (current || 0) + 1);
        localStorage.setItem(legacyVisitorKey, "1");
      }
    }

    onValue(visitorsRef, snapshot => {
      if(visitorEl) visitorEl.textContent = formatCount(snapshot.val());
    });

    onValue(viewsRef, snapshot => {
      if(viewEl) viewEl.textContent = formatCount(snapshot.val());
    });

    // Presence list is stored under siteStats/global/onlineUsers.
    // The displayed online number is also mirrored to siteStats/global/online.
    const myOnlineRef = push(onlineUsersRef);
    await set(myOnlineRef, {
      online: true,
      at: serverTimestamp(),
      userAgent: navigator.userAgent || "unknown"
    });
    onDisconnect(myOnlineRef).remove();
    window.addEventListener("beforeunload", () => remove(myOnlineRef));

    onValue(onlineUsersRef, snapshot => {
      const count = snapshot.exists() ? snapshot.size : 0;
      if(onlineEl) onlineEl.textContent = formatCount(count);
      set(onlineValueRef, count).catch(() => {});
    });
  }

  initSiteStats().catch(() => {
    if(visitorEl) visitorEl.textContent = "-";
    if(onlineEl) onlineEl.textContent = "-";
    if(viewEl) viewEl.textContent = "-";
  });
</script>
</body>
</html>
